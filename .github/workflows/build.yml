name: Build

on:
  workflow_dispatch:
    inputs:
      build_ref:
        description: Git ref, tag, or commit SHA to build
        required: false
        default: ""
        type: string
      release_tag:
        description: Existing or new release tag to upload files to
        required: false
        default: ""
        type: string
      preset:
        description: CMake preset to build
        required: true
        default: x64-release
        type: choice
        options:
          - x64-release
          - x64-debug
          - x86-release
          - x86-debug
  push:
    tags:
      - "*-v*"

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest

    env:
      BUILD_PRESET: ${{ github.event.inputs.preset || 'x64-release' }}
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.build_ref || github.ref }}
          submodules: recursive

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Vulkan SDK
        shell: powershell
        run: |
          choco install vulkan-sdk -y --no-progress
          $sdk = Get-ChildItem C:\VulkanSDK -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $sdk) {
            throw "Vulkan SDK was not found under C:\VulkanSDK"
          }
          "VULKAN_SDK=$($sdk.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$($sdk.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        shell: cmd
        run: |
          git submodule update --init --recursive
          if errorlevel 1 exit /b 1

          cmake --preset "%BUILD_PRESET%"
          if errorlevel 1 exit /b 1

          cmake --build "out\build\%BUILD_PRESET%"
          if errorlevel 1 exit /b 1

          if not exist "bin" mkdir "bin"
          if not exist "dev-resources\driver\bin\win64" mkdir "dev-resources\driver\bin\win64"

          copy /Y "out\build\%BUILD_PRESET%\OpenVR-SpaceOverride.exe" "bin\OpenVR-SpaceOverride.exe"
          if errorlevel 1 exit /b 1
          copy /Y "3rdparty\OpenVR\bin\win64\openvr_api.dll" "bin\openvr_api.dll"
          if errorlevel 1 exit /b 1
          copy /Y "resources\manifest.vrmanifest" "bin\manifest.vrmanifest"
          if errorlevel 1 exit /b 1
          copy /Y "resources\LICENSE.txt" "bin\LICENSE.txt"
          if errorlevel 1 exit /b 1
          copy /Y "resources\LICENSE" "bin\LICENSE"
          if errorlevel 1 exit /b 1
          copy /Y "resources\LICENSES" "bin\LICENSES"
          if errorlevel 1 exit /b 1
          copy /Y "resources\icon.png" "bin\icon.png"
          if errorlevel 1 exit /b 1
          copy /Y "out\build\%BUILD_PRESET%\driver_spaceoverride.dll" "dev-resources\driver\bin\win64\driver_spaceoverride.dll"
          if errorlevel 1 exit /b 1

      - name: Create installer
        shell: cmd
        working-directory: dev-resources
        run: makensis installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: OpenVR-SpaceOverride-installer-${{ env.BUILD_PRESET }}
          path: dev-resources/OpenVR-SpaceOverride_Installer.exe
          if-no-files-found: error

      - name: Upload staged files
        uses: actions/upload-artifact@v4
        with:
          name: OpenVR-SpaceOverride-staged-${{ env.BUILD_PRESET }}
          path: |
            bin/**
            dev-resources/driver/**
          if-no-files-found: error

      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
        shell: powershell
        run: |
          Compress-Archive -Path bin, dev-resources\driver -DestinationPath OpenVR-SpaceOverride-staged-${env:BUILD_PRESET}.zip -Force

      - name: Upload files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: |
            dev-resources/OpenVR-SpaceOverride_Installer.exe
            OpenVR-SpaceOverride-staged-${{ env.BUILD_PRESET }}.zip
