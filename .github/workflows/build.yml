name: Build

on:
  workflow_dispatch:
    inputs:
      preset:
        description: CMake preset to build
        required: true
        default: x64-release
        type: choice
        options:
          - x64-release
          - x64-debug
          - x86-release
          - x86-debug
  push:
    tags:
      - "*-v*"

jobs:
  windows-installer:
    name: Windows installer
    runs-on: windows-latest

    env:
      BUILD_PRESET: ${{ github.event.inputs.preset || 'x64-release' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis -y --no-progress
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build
        shell: cmd
        run: Build.cmd %BUILD_PRESET%

      - name: Create installer
        shell: cmd
        working-directory: dev-resources
        run: makensis installer.nsi

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: OpenVR-SpaceOverride-installer-${{ env.BUILD_PRESET }}
          path: dev-resources/OpenVR-SpaceOverride_Installer.exe
          if-no-files-found: error

      - name: Upload staged files
        uses: actions/upload-artifact@v4
        with:
          name: OpenVR-SpaceOverride-staged-${{ env.BUILD_PRESET }}
          path: |
            bin/**
            dev-resources/driver/**
          if-no-files-found: error

      - name: Create release archive
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        run: |
          Compress-Archive -Path bin, dev-resources\driver -DestinationPath OpenVR-SpaceOverride-staged-${env:BUILD_PRESET}.zip -Force

      - name: Upload files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dev-resources/OpenVR-SpaceOverride_Installer.exe
            OpenVR-SpaceOverride-staged-${{ env.BUILD_PRESET }}.zip
